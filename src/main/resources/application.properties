spring.application.name=paper-trade

# --- IBKR / TWS connection (override per environment) ---
# 7497 = paper trading, 7496 = live. client-id must be unique per connection.
ibkr.host=127.0.0.1
ibkr.port=7497
ibkr.client-id=1

# --- REST trading API credentials ---
# Defaults are for local dev only. Override via TRADE_API_USERNAME / TRADE_API_PASSWORD
# (e.g. environment variables) before exposing this app anywhere.
trade.api.username=${TRADE_API_USERNAME:trader}
trade.api.password=${TRADE_API_PASSWORD:change-me}
